<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trips</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <img th:src="@{/imagenes/logo.png}" width="175" height="175">
    
    <h1 class="text-center my-4">Trips en El Salvador</h1>

    <table class="table table-hover table-bordered">
        <thead class="table-dark">
            <tr>
                <th>foto</th>
                <th>Id</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Costo</th>
                <th>Calificación</th>
                <th>Detalle</th>
                <th>Activo</th>
                <th>Fecha</th>
                <th>Destacado</th>
                <th>Detalle</th>
                <th>Eliminar</th>
            </tr>
        </thead>
        <tbody>
        
            <tr th:each="trip : ${trips}">
                <td>
                   <img alt="" th:src="@{/imagenes/{img}(img=${trip.imagen})}" width="100" height="100">
                </td>
                <td th:text="${trip.id}"></td>
                <td th:text="${trip.nomTrip}"></td>
                <td th:text="${trip.descripcion}"></td>
                <td th:text="${trip.costo}"></td>
                <td th:text="${trip.calificacion}"></td>
                <td th:text="${trip.detalle}"></td>
                <td th:text="${trip.activo}"></td>
                <td th:text="${trip.fecha}"></td>
               <!--   <td th:text="${trip.destacado == 1 ? 'si' : 'no'}"></td>-->
                
               <td>
        <span th:if="${trip.destacado == 1}" class="badge bg-success">Si</span>
        <span th:unless="${trip.destacado == 1}" class="badge bg-danger">No</span>
    </td>
    <td>
        <a th:href="@{/trips/view/{id}(id=${trip.id})}" class="btn btn-success">Detalle</a>
    </td>
    <td>
       <a th:href="@{/trips/delete(id=${trip.id})}" class="btn btn-danger">Eliminar</a>
   </td>
    
    
    
    
</tr>
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
